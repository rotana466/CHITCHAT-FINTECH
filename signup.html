<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FINCHTECH - Establish Account</title>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
      import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

      // Verified project configuration for chat-base-35120
      const firebaseConfig = {
        apiKey: "AIzaSyBzK4tt4gI-B8GAJVXqKpgQD6PTdtuxkbo",
        authDomain: "chat-base-35120.firebaseapp.com",
        projectId: "chat-base-35120",
        storageBucket: "chat-base-35120.firebasestorage.app",
        messagingSenderId: "132736236077",
        appId: "1:132736236077:web:d021488cc88724970ed6a4"
      };

      // Initialize Firebase Connection
      const app = initializeApp(firebaseConfig);
      const auth = getAuth(app);

      // Registration Form Submission Handler
      window.executeRegistration = function(event) {
          event.preventDefault();
          
          const email = document.getElementById("register-email").value.trim();
          const password = document.getElementById("register-password").value;
          const confirmPassword = document.getElementById("confirm-password").value;
          const feedbackDisplay = document.getElementById("status-box");
          
          // Reset UI display state
          feedbackDisplay.style.display = "none";

          // Client-side password validation
          if (password !== confirmPassword) {
              feedbackDisplay.style.display = "block";
              feedbackDisplay.style.background = "rgba(239, 68, 68, 0.1)";
              feedbackDisplay.style.color = "#f87171";
              feedbackDisplay.style.border = "1px solid rgba(239, 68, 68, 0.2)";
              feedbackDisplay.innerText = "Error: Passwords do not match!";
              return;
          }

          if (password.length < 6) {
              feedbackDisplay.style.display = "block";
              feedbackDisplay.style.background = "rgba(239, 68, 68, 0.1)";
              feedbackDisplay.style.color = "#f87171";
              feedbackDisplay.style.border = "1px solid rgba(239, 68, 68, 0.2)";
              feedbackDisplay.innerText = "Error: Password must be at least 6 characters.";
              return;
          }

          // Create dynamic user inside Firebase console database
          createUserWithEmailAndPassword(auth, email, password)
              .then(() => {
                  feedbackDisplay.style.display = "block";
                  feedbackDisplay.style.background = "rgba(16, 185, 129, 0.1)";
                  feedbackDisplay.style.color = "#34d399";
                  feedbackDisplay.style.border = "1px solid rgba(16, 185, 129, 0.2)";
                  feedbackDisplay.innerText = "Success! Account registered. Redirecting to login...";
                  
                  document.getElementById("registration-form").reset();
                  
                  // Graceful redirection to your login interface (index.html) after 2 seconds
                  setTimeout(() => { 
                      window.location.href = "index.html"; 
                  }, 2000);
              })
              .catch((err) => {
                  feedbackDisplay.style.display = "block";
                  feedbackDisplay.style.background = "rgba(239, 68, 68, 0.1)";
                  feedbackDisplay.style.color = "#f87171";
                  feedbackDisplay.style.border = "1px solid rgba(239, 68, 68, 0.2)";
                  
                  // User-friendly messaging cleanups
                  if (err.code === "auth/email-already-in-use") {
                      feedbackDisplay.innerText = "This email address is already in use.";
                  } else if (err.code === "auth/invalid-email") {
                      feedbackDisplay.innerText = "Invalid email format supplied.";
                  } else {
                      feedbackDisplay.innerText = err.message;
                  }
              });
      };
    </script>

    <style>
        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
        }
        
        body { 
            background-color: #0b0f19; 
            color: #f3f4f6; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            padding: 20px;
        }
        
        .auth-card { 
            background: #111827; 
            width: 100%; 
            max-width: 400px; 
            padding: 35px; 
            border-radius: 14px; 
            border: 1px solid #1f2937; 
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5); 
            text-align: center; 
        }
        
        .brand-header h1 { 
            font-size: 2.1rem; 
            font-weight: 800; 
            background: linear-gradient(to right, #10b981, #3b82f6); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
            letter-spacing: 0.5px;
        }
        
        .brand-header p { 
            color: #9ca3af; 
            font-size: 0.9rem; 
            margin-top: 6px; 
            margin-bottom: 25px; 
        }
        
        .field-group { 
            margin-bottom: 18px; 
            text-align: left; 
        }
        
        .field-group label { 
            display: block; 
            font-size: 0.85rem; 
            color: #9ca3af; 
            margin-bottom: 6px; 
        }
        
        .field-group input { 
            width: 100%; 
            padding: 12px; 
            background: #1f2937; 
            border: 1px solid #374151; 
            border-radius: 8px; 
            color: #ffffff; 
            font-size: 0.95rem; 
            transition: border-color 0.2s;
        }
        
        .field-group input:focus { 
            outline: none; 
            border-color: #10b981; 
        }

        .status-panel { 
            padding: 12px; 
            border-radius: 8px; 
            font-size: 0.88rem; 
            margin-bottom: 20px; 
            display: none; 
            text-align: left; 
            word-break: break-all;
        }
        
        .submit-trigger-btn { 
            width: 100%; 
            padding: 14px; 
            background: linear-gradient(to bottom right, #10b981, #059669); 
            border: none; 
            border-radius: 8px; 
            color: #ffffff; 
            font-weight: 600; 
            cursor: pointer; 
            font-size: 1rem; 
            transition: filter 0.2s;
        }
        
        .submit-trigger-btn:hover {
            filter: brightness(1.08);
        }
        
        .footer-navigation { 
            margin-top: 25px; 
            font-size: 0.9rem; 
            color: #9ca3af; 
        }
        
        .footer-navigation a { 
            color: #3b82f6; 
            text-decoration: none; 
            font-weight: 600; 
        }
        
        .footer-navigation a:hover { 
            text-decoration: underline; 
        }
    </style>
</head>
<body>

    <div class="auth-card">
        <div class="brand-header">
            <h1>FINCHTECH</h1>
            <p>Registration Interface Portal</p>
        </div>

        <div id="status-box" class="status-panel"></div>

        <form id="registration-form" onsubmit="executeRegistration(event);">
            <div class="field-group">
                <label for="register-email">Email Address</label>
                <input type="email" id="register-email" placeholder="name@example.com" required autocomplete="email">
            </div>
            <div class="field-group">
                <label for="register-password">Create Security Password</label>
                <input type="password" id="register-password" placeholder="Minimum 6 characters" required autocomplete="new-password">
            </div>
            <div class="field-group">
                <label for="confirm-password">Confirm Password Verification</label>
                <input type="password" id="confirm-password" placeholder="Repeat security password" required autocomplete="new-password">
            </div>
            <button type="submit" class="submit-trigger-btn">Establish Account</button>
        </form>

        <div class="footer-navigation">
            Already registered? <a href="index.html">Sign In Here</a>
        </div>
    </div>

</body>
</html>
